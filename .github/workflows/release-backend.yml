name: Release Backend Packages

on:
  push:
    tags:
      - "backend-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} backend package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify backend version matches release tag
        shell: python
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          import os
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          expected_version = release_tag.removeprefix("backend-v")
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual_version = str(pyproject["project"]["version"])

          if actual_version != expected_version:
              raise SystemExit(
                  f"backend release tag {release_tag} does not match pyproject version {actual_version}"
              )

      - name: Install project dependencies
        run: python -m pip install -e ".[dev]"

      - name: Build backend release archive
        run: python packaging/build.py --clean --archive-version "${{ github.ref_name }}"

      - name: Verify release archive
        shell: python
        run: |
          from pathlib import Path

          archives = sorted(Path("dist/release").glob("*.zip"))
          if len(archives) != 1:
              raise SystemExit(f"expected exactly one release archive, got: {archives}")
          print(f"verified release archive: {archives[0]}")

      - name: Upload packaged backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: dist/release/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish backend release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify downloaded artifacts
        shell: python
        run: |
          from pathlib import Path

          archives = sorted(Path("release-artifacts").glob("*.zip"))
          if len(archives) < 2:
              raise SystemExit(f"expected at least two backend archives, got: {archives}")
          for archive in archives:
              print(f"release artifact ready: {archive}")

      - name: Create GitHub Release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
          generate_release_notes: true
